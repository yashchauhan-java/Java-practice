<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preserves Text Formatting</title>
</head>
<body>
    <p>It does not preserve spaces and line breaks. No matter how it is written...</p>
    
        <!-- Maintains Whitespace and Line Breaks -->
    <pre>
        This is some preformatted text.
        It preserves both spaces and line breaks.
    </pre>
</body>
</html>
