<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Use Of Video Tag</title>
</head>
<body>
     <video src="images/mountains.mp4" width="500" height="500" controls autoplay muted loop></video> 
     <!-- controls: shows play/pause/volume buttons, autoplay: starts on load, muted: required for autoplay to work in most browsers, loop: replays when it ends -->
</body>
</html>
