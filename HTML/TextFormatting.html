<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Text Formatting</title>
</head>
<body>
    <b>This Is Bold</b> <hr>
<!-- <b> = bold text, visual only, no special meaning -->

<p><strong>This text is important!</strong></p>
<!-- <strong> = bold + tells screen readers/search engines this content is important -->

<i>Italic</i> <hr>
<!-- <i> = italic text, visual only -->

<p><em>This text is emphasized</em></p>
<!-- <em> = italic + adds semantic emphasis, changes how screen readers speak it -->

<u>Underline</u><hr>
<!-- <u> = underlines text, visual only -->

<s>Strikethrough</s><br>
<!-- <s> = shows text that is no longer accurate or relevant -->

<p>This is <sub>Subscript</sub></p>
<!-- <sub> = subscript, lowers and shrinks text (e.g. chemical formulas) -->

<p>This is <sup>Superscript</sup></p>
<!-- <sup> = superscript, raises and shrinks text (e.g. footnotes, exponents) -->

<p>Do not forget to buy <mark>milk</mark> today.</p>
<!-- <mark> = highlights text, like a highlighter pen -->

<p>My favorite color is <del>blue</del> red.</p>
<!-- <del> = shows deleted/removed text, usually with a strikethrough -->

<p><small>This is some smaller text.</small></p>
<!-- <small> = renders text in a smaller font size -->

</body>
</html>
